<svg xmlns="http://www.w3.org/2000/svg" width="1440" height="900" viewBox="0 0 1440 900" role="img" aria-labelledby="title desc">
  <title id="title">Hermes Workflows dashboard overview screenshot</title>
  <desc id="desc">Sanitized example dashboard overview showing configured workflow source, stats, review queue, and recent workflow runs.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#07111f"/>
      <stop offset="0.48" stop-color="#0e1f3a"/>
      <stop offset="1" stop-color="#1b1033"/>
    </linearGradient>
    <linearGradient id="brand" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#2dd4bf"/>
      <stop offset="0.52" stop-color="#60a5fa"/>
      <stop offset="1" stop-color="#c084fc"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="22" stdDeviation="22" flood-color="#020617" flood-opacity="0.35"/>
    </filter>
    <style>
      .label{font:700 22px ui-sans-serif,system-ui,-apple-system,"Segoe UI",sans-serif;fill:#e5f3ff;letter-spacing:-.02em}
      .small{font:500 16px ui-sans-serif,system-ui,-apple-system,"Segoe UI",sans-serif;fill:#8ea9c9}
      .tiny{font:600 13px ui-sans-serif,system-ui,-apple-system,"Segoe UI",sans-serif;fill:#8ea9c9;letter-spacing:.08em;text-transform:uppercase}
      .mono{font:600 15px ui-monospace,SFMono-Regular,Menlo,monospace;fill:#dbeafe}
      .card{fill:#0f1b2f;stroke:#253b59;stroke-width:1.2}
      .soft{fill:#111f35;stroke:#2d4568;stroke-width:1}
      .pill{fill:#12253d;stroke:#2c4a6f;stroke-width:1}
    </style>
  </defs>
  <rect width="1440" height="900" fill="url(#bg)"/>
  <circle cx="1180" cy="130" r="280" fill="#2563eb" opacity="0.18"/>
  <circle cx="280" cy="720" r="260" fill="#14b8a6" opacity="0.13"/>

  <rect x="70" y="54" width="1300" height="792" rx="34" fill="#08111f" stroke="#28405f" filter="url(#shadow)"/>
  <rect x="70" y="54" width="260" height="792" rx="34" fill="#0b1424"/>
  <rect x="70" y="54" width="260" height="792" rx="34" fill="none" stroke="#28405f"/>

  <rect x="102" y="92" width="48" height="48" rx="14" fill="url(#brand)"/>
  <text x="168" y="111" class="tiny">Hermes</text>
  <text x="168" y="134" class="label" font-size="20">Workflows</text>

  <g class="small">
    <text x="104" y="202">Overview</text>
    <text x="104" y="252">Workflows</text>
    <text x="104" y="302">Runs</text>
    <rect x="90" y="332" width="206" height="46" rx="14" fill="#12334d" stroke="#2dd4bf" opacity="0.9"/>
    <text x="104" y="361" fill="#d8fffb">Review Queue</text>
    <text x="104" y="424">Artifacts</text>
  </g>
  <text x="104" y="766" class="tiny">Source</text>
  <rect x="104" y="786" width="162" height="34" rx="17" fill="#101d31" stroke="#2d4568"/>
  <text x="122" y="809" class="small" fill="#dbeafe">default</text>

  <text x="382" y="122" class="tiny">Workflow console</text>
  <text x="382" y="170" class="label" font-size="42">Hermes Workflows</text>
  <text x="382" y="203" class="small">Run workflows, track state, review artifacts, and resume with provenance.</text>
  <rect x="1174" y="112" width="128" height="42" rx="21" fill="url(#brand)"/>
  <text x="1208" y="139" font-family="ui-sans-serif,system-ui" font-size="16" font-weight="800" fill="#031522">Refresh</text>

  <g transform="translate(382 252)">
    <rect class="card" width="216" height="126" rx="22"/>
    <text x="24" y="38" class="tiny">Runnable workflows</text><text x="24" y="88" class="label" font-size="44">4</text><text x="82" y="86" class="small">catalog</text>
  </g>
  <g transform="translate(622 252)">
    <rect class="card" width="216" height="126" rx="22"/>
    <text x="24" y="38" class="tiny">Runs</text><text x="24" y="88" class="label" font-size="44">12</text><text x="102" y="86" class="small">history</text>
  </g>
  <g transform="translate(862 252)">
    <rect class="card" width="216" height="126" rx="22"/>
    <text x="24" y="38" class="tiny">Needs review</text><text x="24" y="88" class="label" font-size="44" fill="#67e8f9">1</text><text x="82" y="86" class="small">waiting</text>
  </g>
  <g transform="translate(1102 252)">
    <rect class="card" width="216" height="126" rx="22"/>
    <text x="24" y="38" class="tiny">Artifacts</text><text x="24" y="88" class="label" font-size="44">26</text><text x="104" y="86" class="small">outputs</text>
  </g>

  <rect x="382" y="426" width="456" height="268" rx="26" class="card"/>
  <text x="414" y="468" class="label" font-size="28">Needs review</text>
  <rect x="414" y="496" width="392" height="158" rx="20" class="soft"/>
  <rect x="438" y="520" width="112" height="28" rx="14" fill="#134e4a"/>
  <text x="456" y="540" class="tiny" fill="#99f6e4">Waiting</text>
  <text x="438" y="580" class="label" font-size="22">Review this draft packet</text>
  <text x="438" y="611" class="small">workflow: reviewable-draft</text>
  <rect x="438" y="628" width="108" height="36" rx="18" fill="#2dd4bf"/>
  <text x="464" y="652" font-family="ui-sans-serif,system-ui" font-size="15" font-weight="800" fill="#05201d">Approve</text>
  <rect x="558" y="628" width="154" height="36" rx="18" fill="#1e293b" stroke="#475569"/>
  <text x="582" y="652" font-family="ui-sans-serif,system-ui" font-size="15" font-weight="800" fill="#dbeafe">Request changes</text>

  <rect x="862" y="426" width="456" height="268" rx="26" class="card"/>
  <text x="894" y="468" class="label" font-size="28">Recent runs</text>
  <g transform="translate(894 502)">
    <rect width="392" height="54" rx="16" class="soft"/>
    <text x="18" y="24" class="mono">wf_release_notes_42</text><text x="18" y="43" class="small">completed · not waiting</text>
    <rect x="282" y="14" width="86" height="28" rx="14" fill="#064e3b"/><text x="302" y="34" class="tiny" fill="#bbf7d0">Done</text>
  </g>
  <g transform="translate(894 570)">
    <rect width="392" height="54" rx="16" class="soft"/>
    <text x="18" y="24" class="mono">wf_docs_review</text><text x="18" y="43" class="small">waiting · review_draft_packet</text>
    <rect x="268" y="14" width="100" height="28" rx="14" fill="#164e63"/><text x="288" y="34" class="tiny" fill="#a5f3fc">Review</text>
  </g>
  <g transform="translate(894 638)">
    <rect width="392" height="54" rx="16" class="soft"/>
    <text x="18" y="24" class="mono">wf_repo_health</text><text x="18" y="43" class="small">completed · 3 artifacts</text>
    <rect x="282" y="14" width="86" height="28" rx="14" fill="#064e3b"/><text x="302" y="34" class="tiny" fill="#bbf7d0">Done</text>
  </g>

  <rect x="382" y="736" width="936" height="56" rx="20" fill="#101d31" stroke="#2d4568"/>
  <text x="414" y="771" class="small">Runtime: CLI, worker, and dashboard share one configured workflow DB alias.</text>
</svg>
