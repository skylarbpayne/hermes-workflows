<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% if page.title %}{{ page.title | escape }} | {% endif %}{{ site.title | escape }}</title>
  <meta name="description" content="{{ site.description | escape }}">
  <style>
    :root { color-scheme: light dark; --bg:#0b1020; --panel:#111827; --text:#e5e7eb; --muted:#9ca3af; --link:#7dd3fc; --border:#253044; --code:#0f172a; }
    @media (prefers-color-scheme: light) { :root { --bg:#ffffff; --panel:#f8fafc; --text:#111827; --muted:#4b5563; --link:#0369a1; --border:#d1d5db; --code:#f1f5f9; } }
    * { box-sizing: border-box; }
    body { margin: 0; font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: var(--bg); color: var(--text); line-height: 1.6; }
    a { color: var(--link); text-decoration-thickness: .08em; text-underline-offset: .18em; }
    .site-header { border-bottom: 1px solid var(--border); background: color-mix(in srgb, var(--panel) 82%, transparent); position: sticky; top: 0; z-index: 20; backdrop-filter: blur(12px); }
    .site-shell { max-width: 1180px; margin: 0 auto; padding: 0 24px; }
    .site-header .site-shell { display: flex; align-items: center; gap: 18px; min-height: 64px; flex-wrap: wrap; }
    .brand { font-weight: 800; letter-spacing: -0.03em; color: var(--text); text-decoration: none; font-size: 1.1rem; }
    .site-nav { display: flex; flex-wrap: wrap; gap: 10px 14px; font-size: .93rem; }
    .site-nav a { color: var(--muted); text-decoration: none; }
    .site-nav a:hover { color: var(--link); }
    main.site-shell { padding-top: 32px; padding-bottom: 80px; }
    .content { max-width: 920px; }
    h1, h2, h3 { line-height: 1.18; letter-spacing: -0.025em; }
    h1 { font-size: clamp(2rem, 4vw, 3.2rem); margin: 0 0 1rem; }
    h2 { margin-top: 2.4rem; padding-top: .6rem; border-top: 1px solid var(--border); }
    p, li { font-size: 1rem; }
    code { background: var(--code); border: 1px solid var(--border); border-radius: .35rem; padding: .12rem .28rem; }
    pre { background: var(--code); border: 1px solid var(--border); border-radius: .7rem; padding: 1rem; overflow-x: auto; }
    pre code { border: 0; padding: 0; background: transparent; }
    table { border-collapse: collapse; width: 100%; display: block; overflow-x: auto; }
    th, td { border: 1px solid var(--border); padding: .55rem .7rem; vertical-align: top; }
    th { background: var(--panel); }
    .doc-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(260px, 1fr)); gap: 1rem; margin: 1.5rem 0; }
    .doc-grid ul { display: contents; }
    .doc-grid li { list-style: none; background: var(--panel); border: 1px solid var(--border); border-radius: .8rem; padding: 1rem; }
    .mermaid { background: #fff; color: #111827; border: 1px solid var(--border); border-radius: .9rem; padding: 1rem; margin: 1.2rem 0; overflow-x: auto; }
    footer { color: var(--muted); border-top: 1px solid var(--border); margin-top: 3rem; padding-top: 1.25rem; font-size: .9rem; }
  </style>
</head>
<body>
  <header class="site-header">
    <div class="site-shell">
      <a class="brand" href="{{ site.baseurl }}/docs/">hermes-workflows</a>
      <nav class="site-nav" aria-label="Documentation">
        <a href="{{ site.baseurl }}/docs/">Docs home</a>
        <a href="{{ site.baseurl }}/docs/setup-for-agents.html">Setup</a>
        <a href="{{ site.baseurl }}/docs/architecture/domain-model-and-seams.html">Architecture</a>
        <a href="{{ site.baseurl }}/docs/architecture/runtime-vs-skills-subagents.html">Runtime boundary</a>
        <a href="{{ site.baseurl }}/docs/operations/inspectability-cookbook.html">Inspectability</a>
        <a href="{{ site.baseurl }}/docs/integrations/hermes-plugin.html">Integration</a>
        <a href="{{ site.baseurl }}/docs/summary.html">Summary</a>
        <a href="{{ site.baseurl }}/">Project</a>
      </nav>
    </div>
  </header>
  <main class="site-shell">
    <article class="content">{{ content }}</article>
    <footer>Durable workflow runtime for trusted Python automation.</footer>
  </main>
  <script type="module">
    import mermaid from 'https://cdn.jsdelivr.net/npm/mermaid@10/dist/mermaid.esm.min.mjs';
    const blocks = document.querySelectorAll('pre > code.language-mermaid');
    blocks.forEach((code) => {
      const wrapper = document.createElement('div');
      wrapper.className = 'mermaid';
      wrapper.textContent = code.textContent || '';
      code.parentElement.replaceWith(wrapper);
    });
    mermaid.initialize({ startOnLoad: true, securityLevel: 'strict', theme: 'base' });
  </script>
</body>
</html>
