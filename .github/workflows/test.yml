name: tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  pytest:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ['3.9', '3.11']
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install package and test dependencies
        run: python -m pip install --upgrade pip && python -m pip install -e '.[dev]'
      - name: Run tests
        run: pytest -q

  release-candidate:
    needs: pytest
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Classify release candidate scope
        id: rc-scope
        shell: bash
        env:
          EVENT_NAME: ${{ github.event_name }}
          PR_BASE_SHA: ${{ github.event.pull_request.base.sha }}
          PR_HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          PUSH_BEFORE_SHA: ${{ github.event.before }}
          PUSH_HEAD_SHA: ${{ github.sha }}
        run: |
          set -euo pipefail

          fail() {
            printf '::error::%s\n' "$*" >&2
            exit 1
          }

          valid_sha() {
            [[ "$1" =~ ^[0-9a-fA-F]{40}$ ]] &&
              [[ "$1" != 0000000000000000000000000000000000000000 ]]
          }

          case "$EVENT_NAME" in
            pull_request)
              base_sha="$PR_BASE_SHA"
              head_sha="$PR_HEAD_SHA"
              ;;
            push)
              base_sha="$PUSH_BEFORE_SHA"
              head_sha="$PUSH_HEAD_SHA"
              ;;
            *)
              fail "Unsupported event for release-candidate scope classification: $EVENT_NAME"
              ;;
          esac

          valid_sha "$base_sha" || fail "Invalid or missing base SHA"
          valid_sha "$head_sha" || fail "Invalid or missing head SHA"
          git cat-file -e "${base_sha}^{commit}" || fail "Base SHA is not an available commit"
          git cat-file -e "${head_sha}^{commit}" || fail "Head SHA is not an available commit"

          diff_file="$(mktemp)"
          trap 'rm -f "$diff_file"' EXIT
          if ! git diff --name-only -z --no-renames "$base_sha" "$head_sha" -- >"$diff_file"; then
            fail "Unable to classify the exact base-to-head diff"
          fi

          required=false
          while IFS= read -r -d '' path; do
            if [[ "$path" == .github/workflows/test.yml ]]; then
              required=true
              continue
            fi

            if [[ "$path" == docs/releases/* ]]; then
              receipt="${path#docs/releases/}"
              if [[ "$receipt" != */* && "$receipt" == *.json ]]; then
                required=true
              fi
            fi
          done <"$diff_file"

          [[ -n "${GITHUB_OUTPUT:-}" ]] || fail "GITHUB_OUTPUT is unavailable"
          printf 'required=%s\n' "$required" >>"$GITHUB_OUTPUT"
      - uses: actions/setup-python@v6
        with:
          python-version: '3.11'
      - name: Build release candidate
        if: steps.rc-scope.outputs.required == 'true'
        run: python -m pip install --upgrade pip build && rm -rf dist && python -m build --wheel
      - name: Verify release candidate bytes and package identity
        if: steps.rc-scope.outputs.required == 'true'
        run: |
          python - <<'PY'
          import hashlib
          import json
          import zipfile
          from pathlib import Path

          release = json.loads(Path("docs/releases/0.0.1rc1.json").read_text(encoding="utf-8"))
          artifact = release["artifact"]
          wheel = Path("dist") / artifact["filename"]
          assert wheel.is_file(), wheel
          assert wheel.stat().st_size == artifact["size_bytes"]
          assert hashlib.sha256(wheel.read_bytes()).hexdigest() == artifact["sha256"]

          with zipfile.ZipFile(wheel) as archive:
              metadata_name = next(name for name in archive.namelist() if name.endswith(".dist-info/METADATA"))
              metadata = archive.read(metadata_name).decode("utf-8")
              version = next(line.split(": ", 1)[1] for line in metadata.splitlines() if line.startswith("Version: "))
              manifest_bytes = archive.read("hermes_workflows/plugin_payload_manifest.v1.json")

          assert version == release["version"]
          manifest = json.loads(manifest_bytes)
          expected_manifest = dict(release["package_resource_manifest"])
          identity = expected_manifest.pop("identity")
          assert manifest == expected_manifest
          assert identity == "sha256:" + hashlib.sha256(manifest_bytes).hexdigest()
          PY
      - uses: actions/upload-artifact@v6
        if: steps.rc-scope.outputs.required == 'true'
        with:
          name: hermes-workflows-0.0.1rc1-${{ github.sha }}
          path: dist/hermes_workflows-0.0.1rc1-py3-none-any.whl
          if-no-files-found: error
          retention-days: 90
